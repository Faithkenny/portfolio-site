<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Resources</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Icon set container */
    .icon-set {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }

    .icon-set.active {
      opacity: 1;
      transform: scale(1);
    }

    .icon-set.inactive {
      opacity: 0;
      transform: scale(1.05);
    }

    /* Icon positioning - Libraries (outline icons) */
    .icon-item {
      position: absolute;
      color: #4a5568;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .icon-set.active .icon-item {
      opacity: 1;
      transform: scale(1);
    }

    /* Staggered animation delays for libraries */
    .icon-set.active .left-1 { transition-delay: 0ms; }
    .icon-set.active .left-2 { transition-delay: 60ms; }
    .icon-set.active .left-3 { transition-delay: 120ms; }
    .icon-set.active .left-4 { transition-delay: 180ms; }
    .icon-set.active .right-1 { transition-delay: 30ms; }
    .icon-set.active .right-2 { transition-delay: 90ms; }
    .icon-set.active .right-3 { transition-delay: 150ms; }
    .icon-set.active .right-4 { transition-delay: 210ms; }

    /* Icon positions */
    .left-1 { left: 8%; top: 25%; }
    .left-2 { left: 18%; top: 15%; }
    .left-3 { left: 12%; bottom: 30%; }
    .left-4 { left: 22%; bottom: 20%; }

    .right-1 { right: 8%; top: 25%; }
    .right-2 { right: 18%; top: 15%; }
    .right-3 { right: 12%; bottom: 30%; }
    .right-4 { right: 22%; bottom: 20%; }

    /* Plugin cards */
    .plugin-card {
      position: absolute;
      opacity: 0;
      transform: scale(0.5) translateY(10px);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .icon-set.active .plugin-card {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Staggered animation delays for plugins */
    .icon-set.active .plugin-card.left-1 { transition-delay: 0ms; }
    .icon-set.active .plugin-card.left-2 { transition-delay: 70ms; }
    .icon-set.active .plugin-card.left-3 { transition-delay: 140ms; }
    .icon-set.active .plugin-card.left-4 { transition-delay: 210ms; }
    .icon-set.active .plugin-card.right-1 { transition-delay: 35ms; }
    .icon-set.active .plugin-card.right-2 { transition-delay: 105ms; }
    .icon-set.active .plugin-card.right-3 { transition-delay: 175ms; }

    /* Plugin card positions */
    .plugin-card.left-1 { left: 10%; top: 30%; }
    .plugin-card.left-2 { left: 20%; top: 18%; }
    .plugin-card.left-3 { left: 15%; bottom: 25%; }
    .plugin-card.left-4 { left: 25%; bottom: 35%; }

    .plugin-card.right-1 { right: 15%; top: 20%; }
    .plugin-card.right-2 { right: 10%; top: 35%; }
    .plugin-card.right-3 { right: 20%; bottom: 25%; }

    /* Colorful icons */
    .colorful-icon {
      position: absolute;
      opacity: 0;
      transform: scale(0.5) rotate(-10deg);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .icon-set.active .colorful-icon {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* Staggered animation delays for colorful icons */
    .icon-set.active .colorful-icon.left-1 { transition-delay: 0ms; }
    .icon-set.active .colorful-icon.left-2 { transition-delay: 80ms; }
    .icon-set.active .colorful-icon.left-3 { transition-delay: 160ms; }
    .icon-set.active .colorful-icon.right-1 { transition-delay: 40ms; }
    .icon-set.active .colorful-icon.right-2 { transition-delay: 120ms; }
    .icon-set.active .colorful-icon.right-3 { transition-delay: 200ms; }

    /* Colorful icon positions */
    .colorful-icon.left-1 { left: 12%; top: 25%; }
    .colorful-icon.left-2 { left: 22%; top: 40%; }
    .colorful-icon.left-3 { left: 18%; bottom: 25%; }

    .colorful-icon.right-1 { right: 12%; top: 20%; }
    .colorful-icon.right-2 { right: 18%; top: 40%; }
    .colorful-icon.right-3 { right: 22%; bottom: 30%; }

    /* Keyword highlighting */
    .keyword {
      color: #64748b;
      transition: color 0.4s ease-out;
    }

    .keyword.highlight {
      color: #60a5fa;
    }

    /* Pulsating animation for active icons */
    @keyframes pulse-gentle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .icon-set.active .icon-item,
    .icon-set.active .plugin-card,
    .icon-set.active .colorful-icon {
      animation: pulse-gentle 2s ease-in-out infinite;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .icon-item, .plugin-card, .colorful-icon { transform: scale(0.7); }
      .left-1 { left: 5%; top: 30%; }
      .left-2 { left: 12%; top: 12%; }
      .left-3 { left: 5%; bottom: 35%; }
      .left-4 { left: 15%; bottom: 15%; }
      .right-1 { right: 5%; top: 30%; }
      .right-2 { right: 12%; top: 12%; }
      .right-3 { right: 5%; bottom: 35%; }
      .right-4 { right: 15%; bottom: 15%; }
      .plugin-card.left-1 { left: 5%; top: 35%; }
      .plugin-card.left-2 { left: 12%; top: 15%; }
      .plugin-card.left-3 { left: 5%; bottom: 30%; }
      .plugin-card.left-4 { left: 18%; bottom: 40%; }
      .plugin-card.right-1 { right: 8%; top: 15%; }
      .plugin-card.right-2 { right: 5%; top: 40%; }
      .plugin-card.right-3 { right: 12%; bottom: 30%; }
      .colorful-icon.left-1 { left: 5%; top: 30%; }
      .colorful-icon.left-2 { left: 15%; top: 45%; }
      .colorful-icon.left-3 { left: 8%; bottom: 30%; }
      .colorful-icon.right-1 { right: 5%; top: 25%; }
      .colorful-icon.right-2 { right: 10%; top: 45%; }
      .colorful-icon.right-3 { right: 15%; bottom: 35%; }
    }

    @media (max-width: 480px) {
      .icon-item, .plugin-card, .colorful-icon { transform: scale(0.5); }
    }
  </style>
<base target="_blank">
</head>

          </svg>
        </div>
        <div class="icon-item right-4">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8">
            <path d="M19 21L12 16L5 21V5C5 4.46957 5.21071 3.96086 5.58579 3.58579C5.96086 3.21071 6.46957 3 7 3H17C17.5304 3 18.0391 3.21071 18.4142 3.58579C18.7893 3.96086 19 4.46957 19 5V21Z" />
          </svg>
        </div>
      </div>
      
      <!-- Plugins icons -->
      <div class="icon-set" id="plugins-set">
        <!-- Left side plugin cards -->
        <div class="plugin-card left-1">
          <div class="w-10 h-10 rounded-xl bg-[#1a1a2e] border border-[#2a2a3e] flex items-center justify-center">

        <div class="plugin-card left-2">

              <circle cx="9" cy="10" r="2" fill="#4ade80"/>

          <div class="w-12 h-14 rounded-xl bg-[#1a1a2e] border border-[#2a2a3e] flex flex-col items-center justify-center gap-1.5 p-2">
            <div class="w-full h-2 rounded-full bg-pink-400/80"></div>
            <div class="w-full h-2 rounded-full bg-purple-500/80"></div>
          </div>
        </div>
        <div class="plugin-card left-4">
          <div class="w-10 h-10 rounded-xl bg-[#1a1a2e] border border-[#2a2a3e] flex items-center justify-center">
            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#f472b6" stroke-width="1.5"/>
              <text x="12" y="16" text-anchor="middle" fill="#f472b6" font-size="10" font-family="sans-serif">@</text>
            </svg>
          </div>
        </div>
        <!-- Right side plugin cards -->
        <div class="plugin-card right-1">
          <div class="w-10 h-10 rounded-xl bg-[#1a1a2e] border border-[#2a2a3e] flex items-center justify-center">
            <span class="text-gray-400 text-sm font-medium">Aa</span>
          </div>
        </div>
        <div class="plugin-card right-2">
          <div class="w-12 h-14 rounded-xl bg-[#1a1a2e] border border-[#2a2a3e] flex flex-col items-center justify-center gap-1.5 p-2">
            <div class="flex items-center gap-1.5 w-full">
              <div class="w-2 h-2 rounded-sm bg-pink-400 rotate-45"></div>
              <div class="flex-1 h-2 rounded-full bg-pink-400/80"></div>
            </div>
            <div class="flex items-center gap-1.5 w-full">
              <div class="w-2 h-2 rounded-sm bg-purple-500 rotate-45"></div>
              <div class="flex-1 h-2 rounded-full bg-purple-500/80"></div>
            </div>
          </div>
        </div>
        <div class="plugin-card right-3">
          <div class="w-10 h-10 rounded-xl bg-[#1a1a2e] border border-[#2a2a3e] flex items-center justify-center">

              <path d="M4 19.5C4 18.837 4.26339 18.2011 4.73223 17.7322C5.20107 17.2634 5.83696 17 6.5 17H20" />

              <div class="w-3 h-4 rounded-sm bg-white/90"></div>
              <div class="w-3 h-3 rounded-sm bg-white/90"></div>

        <h2 class="text-2xl md:text-3xl lg:text-4xl font-semibold text-white leading-relaxed">
          Discover community-made 
          <span class="keyword highlight" id="kw-libraries">libraries</span>, 
          <span class="keyword" id="kw-plugins">plugins</span>, 
          <span class="keyword" id="kw-iconsets">icon sets</span>, and more
        </h2>
      </div>
    </div>
  </div>

  <script>
    let phase = 0; // 0: libraries, 1: plugins, 2: icon sets
    
    const sets = ['libraries', 'plugins', 'iconsets'];
    
    function updatePhase() {
      // Update icon sets
      sets.forEach((set, index) => {
        const el = document.getElementById(set + '-set');
        if (index === phase) {
          el.classList.add('active');
          el.classList.remove('inactive');
        } else {
          el.classList.remove('active');
          el.classList.add('inactive');
        }
      });
      
      // Update keywords
      sets.forEach((set, index) => {
        const kw = document.getElementById('kw-' + set);
        if (index === phase) {
          kw.classList.add('highlight');
        } else {
          kw.classList.remove('highlight');
        }
      });
      
      phase = (phase + 1) % 3;
    }
    
    // Change every 2 seconds
    setInterval(updatePhase, 2000);
  </script>
</body>
